apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gelato-postgres-pvc
  namespace: gelato
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gelato-postgres
  namespace: gelato
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gelato-postgres
  template:
    metadata:
      labels:
        app: gelato-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: gelato-postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "gelato"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gelato-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: gelato-postgres
  namespace: gelato
spec:
  selector:
    app: gelato-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
