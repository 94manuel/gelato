apiVersion: apps/v1
kind: Deployment
metadata:
  name: gelato-api
  namespace: gelato
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gelato-api
  template:
    metadata:
      labels:
        app: gelato-api
    spec:
      containers:
        - name: api
          image: ghcr.io/94manuel/gelato-api:main
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gelato-postgres-secret
                  key: DATABASE_URL
            - name: CORS_ORIGIN
              value: "https://gelato.cybervestigio.com,http://gelato.cybervestigio.com"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gelato-api
  namespace: gelato
spec:
  selector:
    app: gelato-api
  ports:
    - name: http
      port: 3001
      targetPort: 3001
