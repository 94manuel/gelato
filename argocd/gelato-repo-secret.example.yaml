# Ejemplo para registrar el repositorio privado SSH en ArgoCD.
# No pegues llaves reales en Git. Crea este Secret directamente en el cluster
# o usa el CLI: argocd repo add git@github.com:94manuel/gelato.git --ssh-private-key-path ~/.ssh/argocd_gelato
apiVersion: v1
kind: Secret
metadata:
  name: gelato-github-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: git@github.com:94manuel/gelato.git
  sshPrivateKey: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    PEGA_AQUI_LA_LLAVE_PRIVADA_SOLO_EN_TU_CLUSTER_NUNCA_EN_GIT
    -----END OPENSSH PRIVATE KEY-----
